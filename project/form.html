<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Form</title>
</head>
<body>
    <form action="">
        <!-- Name -->
        <label for="fullname">Name:</label>
        <input type="text" placeholder="Enter Your name" name="fullname" id="fullname" requrired><br><br>

        <!-- Email -->
        <label for="email">Email Address:</label>
        <input type="email" placeholder="Enter valid mail id" name="email" id="email"><br><br>

        <!-- Password -->
        <label for="psw">Password:</label>
        <input type="password" placeholder="Enter password" minlength="8" name="psw" id="psw"><br><br>
<!-- Age -->
        <label for="age">Age:</label>
        <input type="number" placeholder="Enter your age" name="age" id="age" min="18" max="100"><br><br>
        <!-- Radio Buttons -->
        <p>Gender:</p>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label><br><br>
        <!-- Checkboxes -->
        <p>Technologies:</p>
        <input type="checkbox" id="java" name="technologies" value="java">
        <label for="java">Java</label>
        <input type="checkbox" id="python" name="technologies" value="python">
        <label for="python">Python</label>
        <input type="checkbox" id="css" name="technologies" value="css">
        <label for="css">CSS</label><br><br>
        <!-- Dropdown -->
        <label for="country">Country:</label>
        <select name="country" id="country">
            <option value="india">India</option>
            <option value="canada">Canada</option>
            <option value="uk">UK</option>
        </select><br><br>
        <!-- Textarea -->
        <label for="message">Message:</label><br>
        <textarea name="message" id="message" rows="4" cols="50"></textarea><br><br>
        <!-- File Upload -->
        <label for="resume">Upload File:</label>
        <input type="file" id="resume" name="resume"><br><br>
        <!-- Date Picker -->
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br><br>
        <!-- Submit Button -->
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body
</html>
